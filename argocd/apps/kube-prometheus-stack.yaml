apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}
        alertmanager:
          config:
            global:
              smtp_smarthost: smtp.gmail.com:587
              smtp_from: minhkhoaoik2209@gmail.com
              smtp_auth_username: minhkhoaoik2209@gmail.com
              smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-smtp-auth/smtp-auth-password
              smtp_require_tls: true
            route:
              group_by:
                - alertname
                - namespace
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 1h
              receiver: personal-email
            receivers:
              - name: personal-email
                email_configs:
                  - to: minhkhoaoik2209@gmail.com
                    send_resolved: true
        grafana:
          adminPassword: admin
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
